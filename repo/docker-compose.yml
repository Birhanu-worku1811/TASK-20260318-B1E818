services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: offline_platform
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    env_file:
      - .env.example
    ports:
      - "8000:8000"
    depends_on:
      - postgres

volumes:
  postgres_data:
